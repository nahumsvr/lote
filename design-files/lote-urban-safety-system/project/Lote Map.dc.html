<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0A0D18; display: flex; justify-content: center; }
  @keyframes loteBreath { 0%,100% { opacity: 0.85; } 50% { opacity: 0.5; } }
  @keyframes loteDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.82); } }
  @keyframes loteSweep { to { transform: rotate(360deg); } }
  @keyframes loteRing { 0% { transform: scale(0.5); opacity: 0.75; } 80%,100% { transform: scale(2.6); opacity: 0; } }
  @keyframes loteFloat { 0%,100% { transform: translate(-50%,-50%) translateY(0); } 50% { transform: translate(-50%,-50%) translateY(-3px); } }
</style>
</helmet>
<div style="width: 390px; height: 844px; background: {{ t.frame }}; border-radius: 46px; overflow: hidden; position: relative; font-family: 'Geist', sans-serif; box-shadow: 0 40px 90px -30px rgba(0,0,0,0.7); color: {{ t.text }}; display: flex; flex-direction: column;">

  <!-- ambient glow + grain -->
  <div style="position: absolute; top: -120px; left: -40px; width: 360px; height: 320px; background: {{ t.glow1 }}; pointer-events: none;"></div>
  <div style="position: absolute; top: -80px; right: -80px; width: 300px; height: 280px; background: {{ t.glow2 }}; pointer-events: none;"></div>
  <svg style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: {{ t.grainOp }}; pointer-events: none; mix-blend-mode: {{ t.grainBlend }};"><filter id="loteGrain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#loteGrain)"/></svg>

  <!-- status bar -->
  <div style="position: relative; display: flex; align-items: center; justify-content: space-between; padding: 16px 28px 6px;">
    <span style="font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500;">21:47</span>
    <span style="display: flex; align-items: center; gap: 8px; opacity: 0.72;">
      <svg width="18" height="13" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0.5" width="3" height="11.5" rx="1"/></svg>
      <svg width="25" height="13" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="0.5" width="20" height="11" rx="3" stroke="currentColor"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.5" fill="currentColor"/><rect x="21.5" y="4" width="1.5" height="4" rx="0.75" fill="currentColor"/></svg>
    </span>
  </div>

  <!-- header -->
  <div style="position: relative; padding: 6px 24px 14px;">
    <div style="display: flex; align-items: flex-start; justify-content: space-between;">
      <div>
        <div style="font-family: 'Geist', sans-serif; font-weight: 800; font-size: 30px; letter-spacing: -0.02em; line-height: 1;">CDMX <span style="color: #D93030;">ahora</span></div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: {{ t.gold }}; margin-top: 7px; letter-spacing: 0.01em;">19.4326° N · 99.1332° W</div>
      </div>
      <div style="display: flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 999px; background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.4);">
        <span style="width: 7px; height: 7px; border-radius: 50%; background: #2ECC71; animation: loteDot 1.6s ease-in-out infinite;"></span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 500; letter-spacing: 0.08em; color: {{ t.greenText }};">EN VIVO</span>
      </div>
    </div>
    <div style="font-size: 13.5px; line-height: 1.4; color: {{ t.text2 }}; margin-top: 12px;">Todo tranquilo por tu rumbo. Hay <span style="color: {{ t.redText }}; font-weight: 600;">1 zona</span> que mejor evitas esta noche.</div>
  </div>

  <!-- MAP -->
  <div style="position: relative; flex: 1 1 auto; min-height: 290px; background: {{ t.mapBg }}; overflow: hidden; border-top: 1px solid {{ t.statBorder }}; border-bottom: 1px solid {{ t.statBorder }};">
    <div style="position: absolute; left: 48.2%; top: 48.6%; width: 520px; height: 520px; transform: translate(-50%,-50%); border-radius: 50%; background: {{ t.radarGrad }}; -webkit-mask: radial-gradient(circle, #000 0%, rgba(0,0,0,0.6) 42%, transparent 70%); mask: radial-gradient(circle, #000 0%, rgba(0,0,0,0.6) 42%, transparent 70%); animation: loteSweep 7s linear infinite; pointer-events: none;"></div>

    <svg viewBox="0 0 390 360" preserveAspectRatio="none" style="position: absolute; inset: 0; width: 100%; height: 100%; display: block;">
      <defs>
        <pattern id="loteGrid" width="33" height="33" patternUnits="userSpaceOnUse" patternTransform="rotate(2)">
          <path d="M33 0H0V33" fill="none" stroke="{{ t.gridStroke }}" stroke-width="1"/>
        </pattern>
      </defs>
      <rect x="0" y="0" width="390" height="360" fill="url(#loteGrid)"></rect>
      <path d="M-20 268 Q150 150 430 70" fill="none" stroke="{{ t.avenue }}" stroke-width="9" stroke-linecap="round"></path>
      <path d="M-20 110 Q160 175 430 300" fill="none" stroke="{{ t.avenue2 }}" stroke-width="10" stroke-linecap="round"></path>
      <path d="M120 -20 Q150 180 90 400" fill="none" stroke="{{ t.avenue3 }}" stroke-width="7" stroke-linecap="round"></path>
      <sc-for list="{{ zones }}" as="z" hint-placeholder-count="7">
        <path d="{{ z.path }}" fill="{{ z.fill }}" stroke="{{ z.stroke }}" stroke-width="1.5" style="filter: {{ z.glow }}; animation: {{ z.anim }};"></path>
      </sc-for>
    </svg>

    <div style="position: absolute; inset: 0; pointer-events: none;">
      <sc-for list="{{ zones }}" as="z" hint-placeholder-count="7">
        <div style="position: absolute; left: {{ z.left }}; top: {{ z.top }}; transform: translate(-50%,-50%); display: flex; align-items: center; gap: 5px; opacity: {{ z.op }};">
          <span style="width: 6px; height: 6px; border-radius: 50%; background: {{ z.dot }}; box-shadow: 0 0 6px {{ z.dot }};"></span>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 500; letter-spacing: 0.04em; color: {{ z.labelColor }}; text-shadow: 0 1px 4px {{ t.labelShadow }}; white-space: nowrap;">{{ z.name }}</span>
        </div>
      </sc-for>

      <div style="position: absolute; left: 73.85%; top: 22.78%; transform: translate(-50%,-50%);">
        <span style="position: absolute; left: 50%; top: 50%; width: 26px; height: 26px; transform: translate(-50%,-50%); border-radius: 50%; border: 2px solid rgba(217,48,48,0.6); animation: loteRing 2.4s ease-out infinite;"></span>
        <span style="position: relative; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: #D93030; box-shadow: {{ t.statusShadow }}; border: 2px solid rgba(255,255,255,0.85);">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 2 20h20L12 4Z"/><path d="M12 10v4M12 17v.4"/></svg>
        </span>
      </div>

      <div style="position: absolute; left: 48.2%; top: 49.4%; transform: translate(-50%,-50%); animation: loteFloat 4s ease-in-out infinite;">
        <span style="position: absolute; left: 50%; top: 50%; width: 22px; height: 22px; transform: translate(-50%,-50%); border-radius: 50%; background: rgba(232,86,58,0.35); animation: loteRing 2.8s ease-out infinite;"></span>
        <span style="position: relative; display: block; width: 18px; height: 18px; border-radius: 50%; background: #E8563A; border: 3px solid {{ t.frame }}; box-shadow: 0 0 0 2px #E8563A, 0 4px 10px rgba(0,0,0,0.5);"></span>
        <span style="position: absolute; top: 24px; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; letter-spacing: 0.05em; color: {{ t.youLabel }}; text-shadow: 0 1px 4px {{ t.youShadow }}; white-space: nowrap;">TÚ · ROMA NORTE</span>
      </div>
    </div>

    <div style="position: absolute; top: 14px; left: 16px; width: 34px; height: 34px; border-radius: 50%; background: {{ t.glassBg }}; border: 1px solid {{ t.glassBorder }}; backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3 16.5 13 12 10.8 7.5 13 12 3Z" fill="#D93030"/><path d="M12 21 7.5 13 12 15.2 16.5 13 12 21Z" fill="{{ t.faintNeedle }}"/></svg>
    </div>

    <div style="position: absolute; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 10px;">
      <div style="width: 38px; height: 38px; border-radius: 12px; background: {{ t.glassBg }}; border: 1px solid {{ t.glassBorder }}; backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E8563A" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </div>
      <div style="border-radius: 12px; overflow: hidden; background: {{ t.glassBg }}; border: 1px solid {{ t.glassBorder }}; backdrop-filter: blur(6px);">
        <div style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 19px; color: {{ t.text }}; border-bottom: 1px solid {{ t.glassDivider }};">+</div>
        <div style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 19px; color: {{ t.text }};">−</div>
      </div>
    </div>
  </div>

  <!-- stat bar -->
  <div style="position: relative; display: grid; grid-template-columns: repeat(4, 1fr); padding: 15px 6px;">
    <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 3px; border-right: 1px solid {{ s.border }};">
        <div style="display: flex; align-items: baseline; gap: 6px;"><span style="width: 7px; height: 7px; border-radius: 50%; background: {{ s.color }};"></span><span style="font-family: 'Geist', sans-serif; font-weight: 800; font-size: 25px; color: {{ s.color }}; line-height: 1;">{{ s.n }}</span></div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 8.5px; letter-spacing: 0.06em; color: {{ t.mute }};">{{ s.label }}</div>
      </div>
    </sc-for>
  </div>

  <!-- ===== alert carousel ===== -->
  <div style="position: relative; flex-shrink: 0; margin: 9px 12px; border-radius: 22px; background: {{ t.alertBg }}; border: 1px solid {{ t.alertBorder }}; box-shadow: {{ t.alertShadow }}; overflow: hidden;">
    <div style="position: absolute; top: 0; left: 0; bottom: 0; width: 4px; background: {{ curAccent }}; transition: background 0.4s ease; z-index: 2;"></div>
    <div style="display: flex; justify-content: center; padding-top: 9px;"><span style="width: 34px; height: 4px; border-radius: 999px; background: {{ t.handle }};"></span></div>

    <!-- viewport -->
    <div onPointerDown="{{ onDown }}" onPointerMove="{{ onMove }}" onPointerUp="{{ onUp }}" onPointerLeave="{{ onUp }}" style="overflow: hidden; touch-action: pan-y; cursor: grab; user-select: none;">
      <div style="display: flex; min-height: 130px; transform: {{ trackTransform }}; transition: {{ trackTransition }};">
        <sc-for list="{{ alerts }}" as="a" hint-placeholder-count="3">
          <div style="flex: 0 0 100%; padding: 12px 18px 6px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px;">
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="width: 8px; height: 8px; border-radius: 50%; background: {{ a.accent }}; box-shadow: 0 0 8px {{ a.glow }}; animation: loteDot 1.5s ease-in-out infinite;"></span>
                <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.09em; color: {{ a.labelColor }};">{{ a.label }}</span>
              </div>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px; color: {{ t.faint }};">{{ a.time }}</span>
            </div>
            <div style="font-size: 14.5px; line-height: 1.5; color: {{ t.text }};"><sc-for list="{{ a.segs }}" as="seg" hint-placeholder-count="3"><span style="font-weight: {{ seg.w }};">{{ seg.t }}</span></sc-for></div>
            <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 13px;">
              <div style="display: flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: {{ t.mute }};">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="{{ t.gold }}" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.2" fill="{{ t.gold }}" stroke="none"/></svg>
                <span><span style="color: {{ t.gold }};">{{ a.sources }}</span> confirman</span>
              </div>
              <div style="display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 12px; background: {{ a.ctaBg }}; color: {{ a.ctaText }}; font-size: 12.5px; font-weight: 600;">
                {{ a.cta }}
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="{{ a.ctaText }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </div>
            </div>
          </div>
        </sc-for>
      </div>
    </div>

    <!-- dots -->
    <div style="display: flex; justify-content: center; gap: 5px; padding: 6px 0 14px;">
      <sc-for list="{{ alerts }}" as="a" hint-placeholder-count="3">
        <span onClick="{{ a.go }}" style="width: {{ a.dotW }}; height: 4px; border-radius: 999px; background: {{ a.dotBg }}; cursor: pointer; transition: all 0.3s ease;"></span>
      </sc-for>
    </div>
  </div>

  <!-- bottom nav -->
  <div style="flex-shrink: 0; background: {{ t.navBg }}; backdrop-filter: blur(14px); border-top: 1px solid {{ t.navBorder }}; display: grid; grid-template-columns: repeat(4, 1fr); padding: 11px 8px 22px;">
    <div style="position: relative; display: flex; flex-direction: column; align-items: center; gap: 5px; color: #D93030;">
      <span style="position: absolute; top: -12px; width: 22px; height: 3px; border-radius: 999px; background: #D93030;"></span>
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg>
      <span style="font-size: 10.5px; font-weight: 600;">Mapa</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 5px; color: {{ t.navInactive }};">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H10l-5 4v-4H4Z"/></svg>
      <span style="font-size: 10.5px; font-weight: 500;">Chat</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 5px; color: {{ t.navInactive }};">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 2.6 5.6 6.1.7-4.5 4.2 1.2 6L12 16.9 6.6 19.5l1.2-6L3.3 9.3l6.1-.7L12 3Z"/></svg>
      <span style="font-size: 10.5px; font-weight: 500;">Zonas</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 5px; color: {{ t.navInactive }};">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
      <span style="font-size: 10.5px; font-weight: 500;">Config</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 844}, &quot;mode&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;}}">
class Component extends DCLogic {
  state = { idx: 0, dragX: 0, dragging: false };
  componentDidMount() { this.startAuto(); }
  componentWillUnmount() { clearInterval(this._timer); }
  startAuto() {
    clearInterval(this._timer);
    this._timer = setInterval(() => {
      if (!this.state.dragging) this.setState(s => ({ idx: (s.idx + 1) % (this._n || 1) }));
    }, 6000);
  }
  go(i) { this.setState({ idx: i, dragX: 0 }); this.startAuto(); }
  onDown(e) { this._sx = e.clientX; this.setState({ dragging: true }); clearInterval(this._timer); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} }
  onMove(e) { if (this.state.dragging) this.setState({ dragX: e.clientX - this._sx }); }
  onUp() {
    if (!this.state.dragging) return;
    const dx = this.state.dragX;
    let idx = this.state.idx;
    if (dx < -40) idx = Math.min(this._n - 1, idx + 1);
    else if (dx > 40) idx = Math.max(0, idx - 1);
    this.setState({ idx, dragX: 0, dragging: false });
    this.startAuto();
  }
  blob(cx, cy, r, seed) {
    let s = seed % 2147483647; if (s <= 0) s += 2147483646;
    const rand = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
    const n = 9, pts = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const rr = r * (0.8 + rand() * 0.36);
      pts.push([cx + Math.cos(a) * rr, cy + Math.sin(a) * rr]);
    }
    let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)} `;
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n], p1 = pts[i], p2 = pts[(i + 1) % n], p3 = pts[(i + 2) % n];
      const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
      const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += `C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)} `;
    }
    return d + 'Z';
  }
  renderVals() {
    const mode = this.props.mode || 'dark';
    const dark = mode === 'dark';
    const t = dark ? {
      frame: '#13172A', text: '#F4F2EE', text2: 'rgba(244,242,238,0.62)', mute: 'rgba(244,242,238,0.45)', faint: 'rgba(244,242,238,0.4)', faintDot: 'rgba(244,242,238,0.25)',
      mapBg: '#0E1322', gridStroke: 'rgba(255,255,255,0.045)', avenue: 'rgba(255,255,255,0.05)', avenue2: 'rgba(255,255,255,0.045)', avenue3: 'rgba(255,255,255,0.04)',
      glassBg: 'rgba(19,23,42,0.78)', glassBorder: 'rgba(255,255,255,0.1)', glassDivider: 'rgba(255,255,255,0.08)', statBorder: 'rgba(255,255,255,0.08)',
      navBg: 'rgba(19,23,42,0.92)', navBorder: 'rgba(255,255,255,0.07)', navInactive: 'rgba(244,242,238,0.42)',
      gold: '#D6B85E', redText: '#EE8B86', greenText: '#5BD996',
      glow1: 'radial-gradient(circle, rgba(217,48,48,0.16), transparent 65%)', glow2: 'radial-gradient(circle, rgba(200,168,75,0.08), transparent 68%)',
      grainBlend: 'overlay', grainOp: 0.05,
      radarGrad: 'conic-gradient(from 0deg, transparent 0deg, rgba(232,86,58,0) 280deg, rgba(232,86,58,0.14) 350deg, rgba(217,48,48,0.22) 360deg)',
      alertBg: 'linear-gradient(180deg, #1E2438, #1A2034)', alertBorder: 'rgba(255,255,255,0.08)', alertShadow: '0 18px 40px -16px rgba(0,0,0,0.7)', handle: 'rgba(244,242,238,0.18)',
      faintNeedle: 'rgba(244,242,238,0.4)', youLabel: '#F4B8A8', youShadow: 'rgba(0,0,0,0.9)', labelShadow: 'rgba(0,0,0,0.8)', statusShadow: '0 0 16px rgba(217,48,48,0.7)'
    } : {
      frame: '#F4F2EE', text: '#13172A', text2: 'rgba(19,23,42,0.66)', mute: 'rgba(19,23,42,0.5)', faint: 'rgba(19,23,42,0.45)', faintDot: 'rgba(19,23,42,0.2)',
      mapBg: '#E8E4DB', gridStroke: 'rgba(19,23,42,0.05)', avenue: 'rgba(255,255,255,0.8)', avenue2: 'rgba(255,255,255,0.72)', avenue3: 'rgba(255,255,255,0.6)',
      glassBg: 'rgba(255,255,255,0.82)', glassBorder: 'rgba(19,23,42,0.1)', glassDivider: 'rgba(19,23,42,0.08)', statBorder: 'rgba(19,23,42,0.1)',
      navBg: 'rgba(255,255,255,0.92)', navBorder: 'rgba(19,23,42,0.08)', navInactive: 'rgba(19,23,42,0.42)',
      gold: '#9C7016', redText: '#C42828', greenText: '#1E9E54',
      glow1: 'radial-gradient(circle, rgba(217,48,48,0.08), transparent 65%)', glow2: 'radial-gradient(circle, rgba(200,168,75,0.1), transparent 68%)',
      grainBlend: 'multiply', grainOp: 0.04,
      radarGrad: 'conic-gradient(from 0deg, transparent 0deg, rgba(232,86,58,0) 290deg, rgba(217,48,48,0.06) 350deg, rgba(217,48,48,0.13) 360deg)',
      alertBg: 'linear-gradient(180deg, #FFFFFF, #FBFAF7)', alertBorder: 'rgba(19,23,42,0.1)', alertShadow: '0 18px 40px -16px rgba(19,23,42,0.2)', handle: 'rgba(19,23,42,0.18)',
      faintNeedle: 'rgba(19,23,42,0.4)', youLabel: '#C42828', youShadow: 'rgba(255,255,255,0.95)', labelShadow: 'rgba(255,255,255,0.9)', statusShadow: '0 0 16px rgba(217,48,48,0.5)'
    };

    const ST = dark ? {
      green:  { fill: 'rgba(46,204,113,0.15)', stroke: 'rgba(46,204,113,0.5)', dot: '#2ECC71', label: '#7FE0AC', glow: 'none', anim: 'none', op: 0.78 },
      yellow: { fill: 'rgba(240,180,41,0.17)', stroke: 'rgba(240,180,41,0.6)', dot: '#F0B429', label: '#F0C566', glow: 'none', anim: 'loteBreath 3.4s ease-in-out infinite', op: 0.95 },
      red:    { fill: 'rgba(217,48,48,0.22)', stroke: 'rgba(217,48,48,0.7)', dot: '#D93030', label: '#EE8B86', glow: 'drop-shadow(0 0 10px rgba(217,48,48,0.5))', anim: 'loteBreath 2.6s ease-in-out infinite', op: 1 }
    } : {
      green:  { fill: 'rgba(46,204,113,0.24)', stroke: 'rgba(46,204,113,0.55)', dot: '#27B763', label: '#1B8F4D', glow: 'none', anim: 'none', op: 0.92 },
      yellow: { fill: 'rgba(240,180,41,0.30)', stroke: 'rgba(240,180,41,0.7)', dot: '#D99B16', label: '#9C7016', glow: 'none', anim: 'loteBreath 3.4s ease-in-out infinite', op: 1 },
      red:    { fill: 'rgba(217,48,48,0.20)', stroke: 'rgba(217,48,48,0.65)', dot: '#D93030', label: '#C42828', glow: 'drop-shadow(0 0 8px rgba(217,48,48,0.35))', anim: 'loteBreath 2.6s ease-in-out infinite', op: 1 }
    };
    const defs = [
      { name: 'POLANCO', cx: 86, cy: 76, r: 50, seed: 11, st: 'green' },
      { name: 'CENTRO', cx: 288, cy: 82, r: 56, seed: 23, st: 'red', hideLabel: true },
      { name: 'CONDESA', cx: 80, cy: 190, r: 44, seed: 37, st: 'green' },
      { name: 'ROMA NORTE', cx: 188, cy: 175, r: 50, seed: 53, st: 'yellow', hideLabel: true },
      { name: 'DOCTORES', cx: 302, cy: 204, r: 42, seed: 67, st: 'yellow' },
      { name: 'DEL VALLE', cx: 104, cy: 296, r: 47, seed: 83, st: 'green' },
      { name: 'COYOACÁN', cx: 276, cy: 304, r: 52, seed: 97, st: 'green' }
    ];
    const zones = defs.map(d => {
      const z = ST[d.st];
      return {
        name: d.hideLabel ? '' : d.name, left: (d.cx / 390 * 100).toFixed(2) + '%', top: (d.cy / 360 * 100).toFixed(2) + '%',
        path: this.blob(d.cx, d.cy, d.r, d.seed),
        fill: z.fill, stroke: z.stroke, glow: z.glow, anim: z.anim, dot: z.dot, labelColor: z.label, op: d.hideLabel ? 0 : z.op
      };
    });
    const stats = [
      { n: '4', label: 'SEGURAS', color: dark ? '#2ECC71' : '#1B8F4D', border: t.statBorder },
      { n: '2', label: 'MONITOREAR', color: dark ? '#F0B429' : '#B5851A', border: t.statBorder },
      { n: '1', label: 'EVITAR', color: '#D93030', border: t.statBorder },
      { n: '14', label: 'REPORTES', color: t.gold, border: 'transparent' }
    ];

    const KIND = {
      red: { accent: '#D93030', glow: 'rgba(217,48,48,0.8)', grad: 'linear-gradient(180deg, #D93030, #E8563A)', ctaBg: '#D93030', ctaText: '#fff', labelColor: t.redText },
      yellow: { accent: '#F0B429', glow: 'rgba(240,180,41,0.7)', grad: 'linear-gradient(180deg, #F0B429, #E8A33A)', ctaBg: '#F0B429', ctaText: '#13172A', labelColor: t.gold }
    };
    const raw = [
      { kind: 'red', label: 'EVITAR · CENTRO HISTÓRICO', time: 'hace 4 min', sources: '6 fuentes', cta: 'Ver ruta segura',
        segs: [{ t: 'Aguas con el Centro — hay marcha en ' }, { t: '5 de Febrero', b: 1 }, { t: ' y el acceso al Zócalo está cerrado por el norte. Mejor déjalo para mañana.' }] },
      { kind: 'yellow', label: 'MONITOREAR · DOCTORES', time: 'hace 12 min', sources: '4 fuentes', cta: 'Ver detalles',
        segs: [{ t: 'Cierre de carril en ' }, { t: 'Eje Central', b: 1 }, { t: ' por un evento. No es riesgo, pero tu Uber puede tardar. Tenlo en cuenta si vas con prisa.' }] },
      { kind: 'yellow', label: 'MONITOREAR · REFORMA', time: 'hace 9 min', sources: '3 fuentes', cta: 'Ver detalles',
        segs: [{ t: 'Se está juntando gente en el ' }, { t: 'Ángel', b: 1 }, { t: ' por la previa del partido. Tranquilo por ahora, pero ojo si llevas niños.' }] }
    ];
    this._n = raw.length;
    const idx = this.state.idx;
    const alerts = raw.map((a, i) => {
      const k = KIND[a.kind];
      return {
        label: a.label, time: a.time, sources: a.sources, cta: a.cta,
        segs: a.segs.map(s => ({ t: s.t, w: s.b ? 600 : 400 })),
        accent: k.accent, glow: k.glow, ctaBg: k.ctaBg, ctaText: k.ctaText, labelColor: k.labelColor,
        go: () => this.go(i), dotW: i === idx ? '16px' : '4px', dotBg: i === idx ? k.accent : t.faintDot
      };
    });
    const curAccent = KIND[raw[idx].kind].grad;
    const trackTransform = `translateX(calc(${-idx * 100}% + ${this.state.dragX}px))`;
    const trackTransition = this.state.dragging ? 'none' : 'transform 0.42s cubic-bezier(.4,0,.2,1)';

    return {
      t, zones, stats, alerts, curAccent, trackTransform, trackTransition,
      onDown: (e) => this.onDown(e), onMove: (e) => this.onMove(e), onUp: () => this.onUp()
    };
  }
}
</script>
