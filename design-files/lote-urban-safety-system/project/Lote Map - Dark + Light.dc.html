<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style> body { margin: 0; } </style>
</helmet>
<div style="min-height: 100vh; background: #1A1E2C; font-family: 'Geist', sans-serif; padding: 56px 40px 80px;">
  <div style="max-width: 980px; margin: 0 auto;">
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.2em; color: #D6B85E; margin-bottom: 14px;">LOTE · PANTALLA MAPA</div>
    <h1 style="font-family: 'Geist', sans-serif; font-weight: 800; font-size: 38px; letter-spacing: -0.02em; color: #F4F2EE; margin: 0 0 8px;">Mapa — Dark &amp; Light</h1>
    <p style="font-size: 16px; line-height: 1.6; color: rgba(244,242,238,0.55); max-width: 620px; margin: 0 0 48px;">El mismo screen en ambos modos. La tira de alerta es un carrusel real — deslízala, toca los puntos, o déjala avanzar sola cada 6&nbsp;segundos. Cada instancia corre su propio estado.</p>

    <div style="display: flex; gap: 56px; flex-wrap: wrap; justify-content: center;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 18px;">
        <dc-import name="Lote Map" mode="dark" hint-size="390px,844px"></dc-import>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em; color: rgba(244,242,238,0.5);">DARK MODE</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 18px;">
        <dc-import name="Lote Map" mode="light" hint-size="390px,844px"></dc-import>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em; color: rgba(244,242,238,0.5);">LIGHT MODE</span>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1060, &quot;height&quot;: 1040}}"></script>
</body>
</html>
